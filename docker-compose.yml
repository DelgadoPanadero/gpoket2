services:
  agent:
    tty: True
    build: ./
    volumes:
      - ./:/home
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    entrypoint: >
      /bin/sh -c "
        minio server /data --console-address ':9001' &
        sleep 5
        mc alias set myminio http://localhost:9000 minioadmin minioadmin
        mc mb myminio/brz
        mc mb myminio/slv
        mc mb myminio/gld
        mc mb myminio/train
        wait
      "

  brz:
    build:
      context: .
      dockerfile: ./Dockerfile.brz
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on: 
      - minio

  slv:
    build:
      context: .
      dockerfile: ./Dockerfile.slv
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on: 
      brz:
        condition: service_completed_successfully

  gld:
    build:
      context: .
      dockerfile: ./Dockerfile.gld
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on: 
      slv:
        condition: service_completed_successfully

  train:
    build:
      context: .
      dockerfile: ./Dockerfile.train
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on: 
      gld:
        condition: service_completed_successfully