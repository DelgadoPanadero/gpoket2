services:
  devcontainer:
    tty: True
    image: ghcr.io/delgadopanadero/gpoket2:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USER:-devuser}
        USER_UID: ${UID:-1000}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    command: bash
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    ports:
      - "2222:22"
    volumes:
      - ./:/home/gpoket2